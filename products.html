<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FaijaneKart — Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#f5f0e8; --card:#ffffff; --ink:#1a1208;
    --muted:#9e8f7a; --accent:#e8420a; --border:#e2d9cc;
    --nav-h: 64px;
  }
  body { background:var(--bg); min-height:100vh; font-family:'Outfit',sans-serif; color:var(--ink); }

  /* NAV */
  nav {
    height:var(--nav-h); background:var(--ink); display:flex;
    align-items:center; justify-content:space-between;
    padding:0 40px; position:sticky; top:0; z-index:100;
  }
  .brand { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; color:#fff; }
  .brand span { color:var(--accent); }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .nav-user { color:#7a6e63; font-size:0.85rem; }
  .nav-btn {
    padding:8px 18px; border-radius:8px; font-family:'Syne',sans-serif;
    font-size:0.85rem; font-weight:700; cursor:pointer; border:none;
    text-decoration:none; display:inline-flex; align-items:center; gap:7px;
    transition:all 0.2s;
  }
  .btn-cart {
    background:var(--accent); color:#fff;
    box-shadow:0 2px 12px rgba(232,66,10,0.3);
  }
  .btn-cart:hover { background:#cf3500; }
  .btn-logout { background:rgba(255,255,255,0.07); color:#888; border:1px solid #333; }
  .btn-logout:hover { color:#fff; border-color:#555; }
  .cart-count {
    background:#fff; color:var(--accent); border-radius:50%;
    width:20px; height:20px; display:inline-flex; align-items:center;
    justify-content:center; font-size:0.72rem; font-weight:700;
  }

  /* HERO */
  .hero {
    background:var(--ink); padding:60px 40px 50px; position:relative; overflow:hidden;
  }
  .hero::after {
    content:''; position:absolute; right:-100px; top:-100px;
    width:400px; height:400px; border-radius:50%;
    background:radial-gradient(circle, rgba(232,66,10,0.18) 0%, transparent 65%);
  }
  .hero-inner { max-width:1100px; margin:0 auto; position:relative; z-index:1; }
  .hero h1 {
    font-family:'Syne',sans-serif; font-size:3.5rem; font-weight:800;
    color:#fff; letter-spacing:-2px; line-height:1;
  }
  .hero h1 span { color:var(--accent); }
  .hero p { color:#5a5048; margin-top:10px; font-size:1rem; }

  /* SEARCH */
  .search-wrap { background:var(--ink); padding:0 40px 30px; }
  .search-inner { max-width:1100px; margin:0 auto; }
  .search-box {
    display:flex; align-items:center; gap:12px;
    background:#2a2318; border:1.5px solid #3a3028; border-radius:12px;
    padding:0 16px; max-width:500px;
  }
  .search-box span { font-size:1.1rem; }
  .search-box input {
    flex:1; background:none; border:none; outline:none;
    color:#e8e0d5; font-family:'Outfit',sans-serif; font-size:0.95rem;
    padding:13px 0;
  }
  .search-box input::placeholder { color:#5a5048; }

  /* GRID */
  .grid-wrap { max-width:1100px; margin:0 auto; padding:36px 40px 80px; }
  .grid-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .grid-header h2 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; }
  .count { color:var(--muted); font-size:0.85rem; }

  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:20px;
  }

  .pcard {
    background:var(--card); border:1.5px solid var(--border); border-radius:16px;
    overflow:hidden; transition:transform 0.2s, box-shadow 0.2s;
    animation:fadeUp 0.4s ease both;
  }
  .pcard:hover { transform:translateY(-5px); box-shadow:0 12px 40px rgba(26,18,8,0.12); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .pcard-img {
    width:100%; height:160px; background:#f0ebe2;
    display:flex; align-items:center; justify-content:center;
    font-size:2.5rem; overflow:hidden; position:relative;
  }
  .pcard-img img { width:100%; height:100%; object-fit:cover; }

  .pcard-body { padding:16px; }
  .pcard-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pcard-desc { color:var(--muted); font-size:0.8rem; margin-bottom:12px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .pcard-footer { display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .pcard-price { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; color:var(--accent); }

  .add-btn {
    padding:8px 14px; background:var(--ink); color:#fff; border:none;
    border-radius:8px; font-family:'Syne',sans-serif; font-size:0.78rem;
    font-weight:700; cursor:pointer; transition:background 0.2s; white-space:nowrap;
  }
  .add-btn:hover { background:#3a2e22; }
  .add-btn.added { background:var(--accent); }
  .add-btn:disabled { opacity:0.5; cursor:not-allowed; }

  /* LOADING */
  .loading-state { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--muted); }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* TOAST */
  #toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--ink); color:#fff; padding:12px 24px; border-radius:30px;
    font-size:0.88rem; font-weight:500; opacity:0; transition:all 0.3s; z-index:999;
    white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.2);
  }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  #toast.success { background:var(--accent); }
</style>
</head>
<body>

<nav>
  <div class="brand">Faijane<span>Kart</span></div>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <button class="nav-btn btn-cart" onclick="window.location.href='/cart.html'">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
    <button class="nav-btn btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <h1>All <span>Products</span></h1>
    <p>Browse our full collection — add anything to your cart</p>
  </div>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search" placeholder="Search products..." oninput="filterProducts()"/>
    </div>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid-header">
    <h2>Products</h2>
    <span class="count" id="countLabel"></span>
  </div>
  <div class="grid" id="grid">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading products...</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// Auth check
const userId = localStorage.getItem('userId');
const username = localStorage.getItem('username');
if (!userId) window.location.href = '/login.html';

document.getElementById('navUser').textContent = username ? `👤 ${username}` : '';

let allProducts = [];
let cartSize = 0;

async function loadProducts() {
  try {
    const res = await fetch('/products');
    if (!res.ok) throw new Error(res.status);
    allProducts = await res.json();
    renderProducts(allProducts);
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="loading-state" style="color:#e8420a">
        <p>⚠️ Failed to load products</p>
        <p style="font-size:0.8rem;margin-top:8px">Make sure Spring Boot is running</p>
      </div>`;
  }
}

async function loadCartCount() {
  try {
    const res = await fetch(`/cart/${userId}`);
    const items = await res.json();
    cartSize = items.length;
    document.getElementById('cartCount').textContent = cartSize;
  } catch(e) {}
}

function renderProducts(list) {
  const grid = document.getElementById('grid');
  document.getElementById('countLabel').textContent = `${list.length} item${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    grid.innerHTML = `<div class="loading-state"><p>No products found.</p></div>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => `
    <div class="pcard" style="animation-delay:${i * 0.05}s">
      <div class="pcard-img">
        ${p.imageUrl
          ? `<img src="${p.imageUrl}" alt="${p.name}" onerror="this.parentElement.textContent='📦'"/>`
          : '📦'}
      </div>
      <div class="pcard-body">
        <div class="pcard-name" title="${p.name}">${p.name}</div>
        <div class="pcard-desc">${p.description || 'No description available'}</div>
        <div class="pcard-footer">
          <div class="pcard-price">₹${p.price.toFixed(2)}</div>
          <button class="add-btn" id="addbtn-${p.id}" onclick="addToCart(${p.id})">+ Cart</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterProducts() {
  const q = document.getElementById('search').value.toLowerCase();
  renderProducts(allProducts.filter(p =>
    p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q)
  ));
}

async function addToCart(productId) {
  const btn = document.getElementById(`addbtn-${productId}`);
  btn.disabled = true; btn.textContent = '...';
  try {
    const res = await fetch(`/cart/add/${userId}/${productId}`, { method: 'POST' });
    if (res.ok) {
      btn.classList.add('added'); btn.textContent = '✓ Added';
      cartSize++;
      document.getElementById('cartCount').textContent = cartSize;
      showToast('Added to cart!', 'success');
      setTimeout(() => {
        btn.classList.remove('added'); btn.textContent = '+ Cart'; btn.disabled = false;
      }, 2000);
    } else {
      btn.textContent = '+ Cart'; btn.disabled = false;
      showToast('Failed to add.');
    }
  } catch(e) {
    btn.textContent = '+ Cart'; btn.disabled = false;
    showToast('Server error.');
  }
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type ? `show ${type}` : 'show';
  setTimeout(() => t.className = '', 2500);
}

function logout() { localStorage.clear(); window.location.href = '/login.html'; }

loadProducts();
loadCartCount();
</script>
</body>
</html>
